# Render.com Blueprint — deploy com um clique
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: medreport-api
    runtime: docker
    dockerfilePath: services/api/Dockerfile
    dockerContext: services/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medreport-db
          property: connectionURI
        # Render gera: postgresql://user:pass@host/db
        # Precisamos trocar para asyncpg:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # definir manualmente no dashboard
      - key: ANVISA_CLIENT_ID
        sync: false
      - key: ANVISA_CLIENT_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          name: medreport-redis
          type: redis
          property: connectionURI
      - key: API_BASE_URL
        # Host público REAL do serviço (o Render anexou o sufixo -07t9).
        # Precisa bater com a URL servida, senão o QR/link de verificação
        # dos PDFs assinados aponta para um host 503.
        value: https://medreport-api-07t9.onrender.com
      - key: PUBMED_ENABLED
        value: "true"
      # Qualidade da geração — validado pelo smoke test de 2026-07-21
      # (baseline vs all, 8 casos: fidelidade 0.86→0.93+, claims sem
      # sustentação −62%, contaminação 0, custo/laudo até menor).
      # Modo "flag": mede e anota, NUNCA altera nem bloqueia o texto.
      # Custo extra: ~R$0,01/laudo (gpt-4o-mini). Rollback = trocar p/ "false".
      - key: FAITHFULNESS_GATE_ENABLED
        value: "true"
      - key: QUALITY_METRICS_ENABLED
        value: "true"

databases:
  - name: medreport-db
    plan: free
    databaseName: medreport
    user: medreport
